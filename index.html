<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VESTO · Plataforma mayorista de indumentaria</title>
  <link rel="icon" href="./assets/logos/vesto-favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { min-height: 100vh; }
    img { max-width: 100%; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Supabase JS v2 — must load before config.js and Data.jsx -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"
          integrity="sha384-tD6X9wDfTRdKpuPoHFZrVW2RXjSYSWjLBPWXxpHprWWl9eaHlwl05aRjHsiKF97n"
          crossorigin="anonymous"></script>

  <!-- config.js está en .gitignore — contiene VESTO_ADMIN_PASS y nunca se sube al repo -->
  <script src="config.js"></script>

  <!-- Order matters: Data first (exposes getProducts/saveProducts), then Components, then screens -->
  <script type="text/babel" src="Data.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Landing.jsx"></script>
  <script type="text/babel" src="Catalog.jsx"></script>
  <script type="text/babel" src="Product.jsx"></script>
  <script type="text/babel" src="Cart.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="Calculator.jsx"></script>
  <script type="text/babel" src="Admin.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [route,    setRoute]    = useState({ screen: 'landing', id: null });
      const [cart,     setCart]     = useState([]);
      const [products, setProducts] = useState(() => getProducts());

      const onNav = (screen, id) => {
        window.scrollTo({ top: 0, behavior: 'instant' });
        setRoute({ screen, id });
      };

      const onAddToCart      = (item) => setCart(prev => [...prev, item]);
      const onRemoveFromCart = (idx)  => setCart(prev => prev.filter((_, i) => i !== idx));
      const onUpdateCartItem = (idx, qty) => {
        if (qty < 1) { onRemoveFromCart(idx); return; }
        setCart(prev => prev.map((item, i) => i === idx ? { ...item, qty } : item));
      };

      const onProductsChange = (newList) => {
        saveProducts(newList);
        setProducts(newList);
      };

      let content;
      switch (route.screen) {
        case 'catalog':
          content = <Catalog onNav={onNav} products={products} onAddToCart={onAddToCart}/>;
          break;
        case 'favorites':
          content = <Catalog onNav={onNav} products={products} onAddToCart={onAddToCart} favoritesOnly={true}/>;
          break;
        case 'product':
          content = <Product onNav={onNav} productId={route.id} onAddToCart={onAddToCart} products={products}/>;
          break;
        case 'cart':
          content = <Cart onNav={onNav} cart={cart} onRemove={onRemoveFromCart} onUpdateQty={onUpdateCartItem}/>;
          break;
        case 'dashboard':
          content = <Dashboard onNav={onNav}/>;
          break;
        case 'calculator':
          content = <Calculator onNav={onNav} products={products}/>;
          break;
        case 'admin':
          content = <Admin onNav={onNav} products={products} onProductsChange={onProductsChange}/>;
          break;
        case 'landing':
        default:
          content = <Landing onNav={onNav} products={products}/>;
      }

      return (
        <div className="app" data-screen-label={`VESTO · ${route.screen}`}>
          <Header current={route.screen} onNav={onNav} cartCount={cart.length}/>
          {content}
          <Footer/>
          <WhatsAppButton/>
          <ScrollToTop/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
